<!DOCTYPE html>
<html lang="en">
<head>
    <title>Northern Stingers - Admin</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --dark-bg: #0a0b0d;
            --accent: #a3bac3;
            --surface: #14161a;
            --text: #ffffff;
            --text-dim: #888;
            --transition: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--dark-bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 2rem 5%; }

        /* Login Page Styles */
        .login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .login-form {
            background: var(--surface);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.03);
            width: 100%;
            max-width: 400px;
        }

        .login-form h1 {
            margin-bottom: 2rem;
            font-weight: 300;
            letter-spacing: 5px;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background: #111;
            border: 1px solid #222;
            color: var(--text);
            border-radius: 10px;
            font-family: inherit;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--accent);
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: var(--dark-bg);
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
        }

        .error-message {
            color: #ff4444;
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        /* Dashboard Styles */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .dashboard-header h1 {
            font-weight: 300;
            letter-spacing: 5px;
        }

        .logout-btn {
            background: none;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: var(--accent);
            color: var(--dark-bg);
        }

        /* Search and Filter */
        .filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 10px;
            background: #111;
            border: 1px solid #222;
            color: var(--text);
            border-radius: 10px;
            font-family: inherit;
        }

        .admin-toggle {
            background: none;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 1rem;
        }

        .admin-toggle:hover {
            background: var(--accent);
            color: var(--dark-bg);
        }

        /* Admin Modal */
        .admin-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            overflow-y: auto;
        }

        .admin-modal-content {
            background: var(--surface);
            margin: 10% auto;
            padding: 2rem;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .admin-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .admin-modal-header h2 {
            font-weight: 300;
            letter-spacing: 3px;
            margin: 0;
        }

        .admin-close-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .admin-form {
            display: grid;
            gap: 1rem;
        }

        .admin-form .form-group label {
            color: var(--text-dim);
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .admin-form .form-group input {
            width: 100%;
            padding: 12px;
            background: #111;
            border: 1px solid #222;
            color: var(--text);
            border-radius: 8px;
            font-family: inherit;
        }

        .admin-form .form-group input:focus {
            border-color: var(--accent);
            outline: none;
        }

        .btn-admin {
            width: fit-content;
            padding: 12px 20px;
            background: var(--accent);
            color: var(--dark-bg);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-admin:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(163, 186, 195, 0.3);
        }

        .admin-note {
            color: var(--text-dim);
            font-size: 0.85rem;
            line-height: 1.4;
            margin-top: 0.5rem;
        }

        .date-filter {
            padding: 10px;
            background: #111;
            border: 1px solid #222;
            color: var(--text);
            border-radius: 10px;
        }

        /* Orders List */
        .orders-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .order-row {
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .order-row:hover {
            border-color: var(--accent);
            transform: translateX(4px);
            box-shadow: 0 4px 20px rgba(163, 186, 195, 0.1);
        }

        .order-main-info {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex: 1;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
            box-shadow: 0 0 10px currentColor;
        }

        .status-placed .status-dot { color: #ffa500; }
        .status-packaged .status-dot { color: #007bff; }
        .status-shipped .status-dot { color: #28a745; }
        .status-delivered .status-dot { color: #6f42c1; }
        .status-cancelled .status-dot { color: #dc3545; }

        .order-number {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent);
            margin: 0;
        }

        .order-customer {
            flex: 1;
        }

        .customer-name {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .customer-email {
            color: var(--text-dim);
            font-size: 0.85rem;
        }

        .order-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.5rem;
        }

        .order-total {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .order-date {
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        .order-items-count {
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        .order-actions {
            margin-left: 1rem;
        }

        .btn-view {
            background: var(--accent);
            color: var(--dark-bg);
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-view:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(163, 186, 195, 0.3);
        }

        /* Enhanced Filters */
        .filters-section {
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .filters-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .filters-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 0;
        }

        .filters-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 1rem;
            align-items: end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
        }

        .filter-group label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-input {
            padding: 12px;
            background: #111;
            border: 1px solid #222;
            color: var(--text);
            border-radius: 8px;
            font-family: inherit;
        }

        .filter-input:focus {
            border-color: var(--accent);
            outline: none;
        }

        .btn-clear-filters {
            background: none;
            border: 1px solid #444;
            color: var(--text-dim);
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-clear-filters:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Order Detail Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal-content {
            background: var(--surface);
            margin: 2% auto;
            border-radius: 20px;
            width: 95%;
            max-width: 900px;
            border: 1px solid rgba(255,255,255,0.03);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 2rem 2rem 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .modal-header h2 {
            font-weight: 300;
            letter-spacing: 3px;
            margin: 0;
            font-size: 1.5rem;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: rgba(255,255,255,0.05);
        }

        .order-details-content {
            padding: 0 2rem 2rem;
        }

        .order-summary {
            background: #111;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 2rem;
        }

        .summary-item {
            text-align: center;
        }

        .summary-label {
            color: var(--text-dim);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .summary-value {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .order-sections {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        .section-card {
            background: #111;
            border-radius: 12px;
            padding: 1.5rem;
        }

        .section-title {
            color: var(--accent);
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .info-grid {
            display: grid;
            gap: 1rem;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: var(--text-dim);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-value {
            font-weight: 500;
        }

        .status-selector {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .status-dropdown {
            padding: 8px 12px;
            background: #0a0b0d;
            border: 1px solid #333;
            color: var(--text);
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.9rem;
        }

        .status-dropdown:focus {
            border-color: var(--accent);
            outline: none;
        }

        .items-section {
            grid-column: 1 / -1;
        }

        .items-list {
            display: grid;
            gap: 1rem;
        }

        .item-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: rgba(255,255,255,0.02);
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .item-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .item-details h4 {
            margin: 0 0 0.25rem;
            font-size: 1rem;
            font-weight: 500;
        }

        .item-meta {
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        .item-price {
            font-weight: 600;
            font-size: 1.1rem;
        }

        /* Loading and Error States */
        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-dim);
        }

        .error {
            background: #ff4444;
            color: white;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
        }

        .success {
            background: var(--accent);
            color: var(--dark-bg);
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .container { padding: 1rem 3%; }

            .dashboard-header {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }

            .filters {
                flex-direction: column;
            }

            .orders-table {
                font-size: 0.8rem;
            }

            .orders-table th,
            .orders-table td {
                padding: 8px;
            }

            .order-details {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <!-- Login Page -->
    <div id="login-page" class="login-container">
        <div class="login-form">
            <h1>NORTHERN STINGERS</h1>
            <p style="color: var(--text-dim); margin-bottom: 2rem;">Admin Access</p>

            <form id="login-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>

                <button type="submit" class="btn-login">LOGIN</button>
            </form>

            <div id="login-error" class="error-message hidden"></div>
        </div>
    </div>

    <!-- Dashboard Page -->
    <div id="dashboard-page" class="container hidden">
        <div class="dashboard-header">
            <h1>Order Management</h1>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <div class="filters-section">
            <div class="filters-header">
                <h2 class="filters-title">Orders</h2>
                <button class="admin-toggle" onclick="openAdminModal()">Manage Admins</button>
            </div>
            <div class="filters-grid">
                <div class="filter-group">
                    <label>Search orders</label>
                    <input type="text" class="filter-input" placeholder="Search by customer name, order ID..." id="search-input">
                </div>
                <div class="filter-group">
                    <label>Status</label>
                    <select class="filter-input" id="status-filter">
                        <option value="">All statuses</option>
                        <option value="Placed">Placed</option>
                        <option value="Packaged">Packaged</option>
                        <option value="Shipped">Shipped</option>
                        <option value="Delivered">Delivered</option>
                        <option value="Cancelled">Cancelled</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Date</label>
                    <input type="date" class="filter-input" id="date-filter">
                </div>
                <button class="btn-clear-filters" onclick="clearFilters()">Clear</button>
            </div>
        </div>

        <div id="message-container"></div>

        <div id="loading" class="loading">Loading orders...</div>

        <div class="orders-list" id="orders-list">
            <!-- Orders will be populated here as list items -->
        </div>
    </div>

    <!-- Order Detail Modal -->
    <div id="order-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Order Details</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>

            <div id="order-details-content" class="order-details-content">
                <!-- Order details will be populated here -->
            </div>
        </div>
    </div>

    <!-- Admin Modal -->
    <div id="admin-modal" class="admin-modal">
        <div class="admin-modal-content">
            <div class="admin-modal-header">
                <h2>Create a new admin</h2>
                <button class="admin-close-btn" onclick="closeAdminModal()">&times;</button>
            </div>

            <form id="create-admin-form" class="admin-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="new-admin-username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="new-admin-password" required>
                </div>
                <div class="form-group">
                    <label>Confirm password</label>
                    <input type="password" id="new-admin-password-confirm" required>
                </div>
                <button type="submit" class="btn-admin">Create admin</button>
                <p class="admin-note">The username becomes an email like <strong>username@northernstingers.com</strong> for Supabase Auth.</p>
            </form>
        </div>
    </div>

    <script>
        // Supabase configuration
        const _supabaseUrl = 'https://oqhkidahpkhrhayxgeum.supabase.co';
        const _supabaseAnonKey = 'sb_publishable_X99T3SQDpC5WT3Df8K8V_Q_2zDICoRx';
        const supabase_client = supabase.createClient(_supabaseUrl, _supabaseAnonKey);

        // Supabase auth configuration
        const ADMIN_EMAIL_DOMAIN = 'northernstingers.com';

        function getAdminEmail(username) {
            return `${username.trim().toLowerCase()}@${ADMIN_EMAIL_DOMAIN}`;
        }

        async function checkAuth() {
            const { data: { session } } = await supabase_client.auth.getSession();
            if (session) {
                showDashboard();
            } else {
                showLogin();
            }
        }

        // Check if user is logged in on page load
        window.onload = checkAuth;

        // Login form handler
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('login-error');

            errorDiv.classList.add('hidden');

            if (!username || !password) {
                errorDiv.textContent = 'Please enter both username and password.';
                errorDiv.classList.remove('hidden');
                return;
            }

            const email = getAdminEmail(username);
            const { data, error } = await supabase_client.auth.signInWithPassword({
                email,
                password
            });

            if (error) {
                errorDiv.textContent = error.message || 'Invalid credentials';
                errorDiv.classList.remove('hidden');
                return;
            }

            if (data.session) {
                showDashboard();
            } else {
                errorDiv.textContent = 'Unable to sign in. Please try again.';
                errorDiv.classList.remove('hidden');
            }
        });

        function showLogin() {
            document.getElementById('login-page').classList.remove('hidden');
            document.getElementById('dashboard-page').classList.add('hidden');
        }

        function showDashboard() {
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('dashboard-page').classList.remove('hidden');
            loadOrders();
        }

        async function logout() {
            await supabase_client.auth.signOut();
            showLogin();
        }

        function openAdminModal() {
            document.getElementById('admin-modal').style.display = 'block';
        }

        function closeAdminModal() {
            document.getElementById('admin-modal').style.display = 'none';
        }

        document.getElementById('create-admin-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('new-admin-username').value.trim();
            const password = document.getElementById('new-admin-password').value;
            const confirmPassword = document.getElementById('new-admin-password-confirm').value;
            const messageContainer = document.getElementById('message-container');

            messageContainer.innerHTML = '';

            if (!username || !password || !confirmPassword) {
                messageContainer.innerHTML = '<div class="error">Please fill in all fields.</div>';
                return;
            }

            if (password !== confirmPassword) {
                messageContainer.innerHTML = '<div class="error">Passwords do not match.</div>';
                return;
            }

            const email = getAdminEmail(username);
            const { data, error } = await supabase_client.auth.signUp({
                email,
                password,
                options: {
                    data: {
                        role: 'admin'
                    },
                    emailRedirectTo: 'https://northernstingers.store'
                }
            });

            if (error) {
                messageContainer.innerHTML = `<div class="error">${error.message}</div>`;
                return;
            }

            document.getElementById('create-admin-form').reset();
            messageContainer.innerHTML = '<div class="success">Admin user created. Please check email verification if enabled.</div>';
        });

        // Load orders from Supabase
        async function loadOrders() {
            const loadingDiv = document.getElementById('loading');
            const ordersList = document.getElementById('orders-list');

            loadingDiv.classList.remove('hidden');
            ordersList.classList.add('hidden');

            try {
                const { data: orders, error } = await supabase_client
                    .from('orders')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                loadingDiv.classList.add('hidden');
                ordersList.classList.remove('hidden');

                displayOrders(orders);
            } catch (error) {
                console.error('Error loading orders:', error);
                loadingDiv.innerHTML = '<div class="error">Failed to load orders. Please try again.</div>';
            }
        }

        // Display orders in list layout
        function displayOrders(orders) {
            const ordersList = document.getElementById('orders-list');
            ordersList.innerHTML = '';

            if (orders.length === 0) {
                ordersList.innerHTML = '<div style="text-align: center; color: var(--text-dim); padding: 2rem;">No orders found</div>';
                return;
            }

            orders.forEach(order => {
                const statusClass = `status-${order.order_status.toLowerCase()}`;
                const itemsCount = order.items.length;
                const totalItems = order.items.reduce((sum, item) => sum + item.quantity, 0);
                const itemsText = totalItems === 1 ? '1 item' : `${totalItems} items`;

                const row = document.createElement('div');
                row.className = 'order-row';
                row.onclick = () => showOrderDetails(order.order_id);

                row.innerHTML = `
                    <div class="order-main-info">
                        <div class="${statusClass}">
                            <div class="status-dot"></div>
                        </div>
                        <div>
                            <h3 class="order-number">#${order.order_id}</h3>
                            <div class="order-items-count">${itemsText}</div>
                        </div>
                        <div class="order-customer">
                            <div class="customer-name">${order.customer_name}</div>
                            <div class="customer-email">${order.email}</div>
                        </div>
                    </div>
                    <div class="order-meta">
                        <div class="order-total">${order.total_price} kr</div>
                        <div class="order-date">${new Date(order.created_at).toLocaleDateString()}</div>
                    </div>
                    <div class="order-actions">
                        <button class="btn-view" onclick="event.stopPropagation(); showOrderDetails('${order.order_id}')">View</button>
                    </div>
                `;

                ordersList.appendChild(row);
            });
        }

        // Show order details in modal
        async function showOrderDetails(orderId) {
            document.getElementById('order-modal').style.display = 'block';
            document.getElementById('modal-title').textContent = `Order ${orderId}`;
            document.getElementById('order-details-content').innerHTML = '<div class="loading">Loading order details...</div>';

            try {
                const { data: order, error } = await supabase_client
                    .from('orders')
                    .select('*')
                    .eq('order_id', orderId)
                    .single();

                if (error) throw error;

                displayOrderDetails(order);
            } catch (error) {
                console.error('Error loading order details:', error);
                document.getElementById('order-details-content').innerHTML = '<div class="error">Failed to load order details.</div>';
            }
        }

        // Display full order details in modal
        function displayOrderDetails(order) {
            const statusOptions = ['Placed', 'Packaged', 'Shipped', 'Delivered', 'Cancelled'];
            const currentStatus = order.order_status;

            // Calculate order summary
            const itemsCount = order.items.length;
            const totalItems = order.items.reduce((sum, item) => sum + item.quantity, 0);

            let itemsHtml = '';
            order.items.forEach(item => {
                itemsHtml += `
                    <div class="item-card">
                        <div class="item-info">
                            <div class="item-details">
                                <h4>${item.name}</h4>
                                <div class="item-meta">${item.variant} × ${item.quantity}</div>
                            </div>
                        </div>
                        <div class="item-price">${item.subtotal} kr</div>
                    </div>
                `;
            });

            const detailsHtml = `
                <div class="order-summary">
                    <div class="summary-item">
                        <div class="summary-label">Order</div>
                        <div class="summary-value">#${order.order_id}</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">Date</div>
                        <div class="summary-value">${new Date(order.created_at).toLocaleDateString()}</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">Total</div>
                        <div class="summary-value">${order.total_price} kr</div>
                    </div>
                </div>

                <div class="order-sections">
                    <div class="section-card">
                        <h3 class="section-title">Customer Information</h3>
                        <div class="info-grid">
                            <div class="info-row">
                                <span class="info-label">Name</span>
                                <span class="info-value">${order.customer_name}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Email</span>
                                <span class="info-value">${order.email}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Phone</span>
                                <span class="info-value">${order.phone}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Address</span>
                                <span class="info-value">${order.address}</span>
                            </div>
                        </div>
                    </div>

                    <div class="section-card">
                        <h3 class="section-title">Order Status</h3>
                        <div class="info-grid">
                            <div class="info-row">
                                <span class="info-label">Current Status</span>
                                <div class="status-selector">
                                    <select class="status-dropdown" id="status-select" onchange="updateOrderStatus('${order.order_id}', this.value)">
                                        ${statusOptions.map(status =>
                                            `<option value="${status}" ${status === currentStatus ? 'selected' : ''}>${status}</option>`
                                        ).join('')}
                                    </select>
                                </div>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Items</span>
                                <span class="info-value">${totalItems} (${itemsCount} type${itemsCount > 1 ? 's' : ''})</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Total Amount</span>
                                <span class="info-value">${order.total_price} kr</span>
                            </div>
                        </div>
                    </div>

                    <div class="section-card items-section">
                        <h3 class="section-title">Order Items</h3>
                        <div class="items-list">
                            ${itemsHtml}
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('order-details-content').innerHTML = detailsHtml;
        }

        // Update order status
        async function updateOrderStatus(orderId, newStatus) {
            const messageContainer = document.getElementById('message-container');
            
            try {
                const { error } = await supabase_client
                    .from('orders')
                    .update({ order_status: newStatus })
                    .eq('order_id', orderId);

                if (error) throw error;

                // Show success message
                messageContainer.innerHTML = '<div class="success">Order status updated successfully!</div>';
                setTimeout(() => messageContainer.innerHTML = '', 3000);

                // Refresh the orders list
                loadOrders();
            } catch (error) {
                console.error('Error updating status:', error);
                messageContainer.innerHTML = '<div class="error">Failed to update order status.</div>';
                setTimeout(() => messageContainer.innerHTML = '', 5000);
            }
        }

        // Close modal
        function closeModal() {
            document.getElementById('order-modal').style.display = 'none';
        }

        // Search and filter functionality
        function applyFilters() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const statusFilter = document.getElementById('status-filter').value;
            const dateFilter = document.getElementById('date-filter').value;

            const rows = document.querySelectorAll('.order-row');

            rows.forEach(row => {
                const orderNumber = row.querySelector('.order-number').textContent.toLowerCase();
                const customerName = row.querySelector('.customer-name').textContent.toLowerCase();
                const customerEmail = row.querySelector('.customer-email').textContent.toLowerCase();
                const date = row.querySelector('.order-date').textContent;

                const matchesSearch = !searchTerm ||
                    orderNumber.includes(searchTerm) ||
                    customerName.includes(searchTerm) ||
                    customerEmail.includes(searchTerm);

                const matchesStatus = !statusFilter || row.querySelector('.status-dot').parentElement.classList.contains(`status-${statusFilter.toLowerCase()}`);

                const matchesDate = !dateFilter || date === new Date(dateFilter).toLocaleDateString();

                if (matchesSearch && matchesStatus && matchesDate) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
        }

        function clearFilters() {
            document.getElementById('search-input').value = '';
            document.getElementById('status-filter').value = '';
            document.getElementById('date-filter').value = '';
            applyFilters();
        }

        // Event listeners for filters
        document.getElementById('search-input').addEventListener('input', applyFilters);
        document.getElementById('status-filter').addEventListener('change', applyFilters);
        document.getElementById('date-filter').addEventListener('change', applyFilters);
    </script>
</body>
</html>
