<!DOCTYPE html>
<html lang="en">
<head>
    <title>Northern Stingers - Admin</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --dark-bg: #0a0b0d;
            --accent: #a3bac3;
            --surface: #14161a;
            --text: #ffffff;
            --text-dim: #888;
            --transition: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--dark-bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 2rem 5%; }

        /* Login Page Styles */
        .login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .login-form {
            background: var(--surface);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.03);
            width: 100%;
            max-width: 400px;
        }

        .login-form h1 {
            margin-bottom: 2rem;
            font-weight: 300;
            letter-spacing: 5px;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background: #111;
            border: 1px solid #222;
            color: var(--text);
            border-radius: 10px;
            font-family: inherit;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--accent);
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: var(--dark-bg);
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
        }

        .error-message {
            color: #ff4444;
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        /* Dashboard Styles */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .dashboard-header h1 {
            font-weight: 300;
            letter-spacing: 5px;
        }

        .logout-btn {
            background: none;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: var(--accent);
            color: var(--dark-bg);
        }

        /* Search and Filter */
        .filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 10px;
            background: #111;
            border: 1px solid #222;
            color: var(--text);
            border-radius: 10px;
            font-family: inherit;
        }

        .date-filter {
            padding: 10px;
            background: #111;
            border: 1px solid #222;
            color: var(--text);
            border-radius: 10px;
        }

        /* Orders Table */
        .orders-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--surface);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .orders-table th,
        .orders-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .orders-table th {
            background: #111;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .orders-table tr:hover {
            background: rgba(255,255,255,0.02);
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-placed { background: #ffa500; color: #000; }
        .status-packaged { background: #007bff; color: #fff; }
        .status-shipped { background: #28a745; color: #fff; }
        .status-delivered { background: #6f42c1; color: #fff; }
        .status-cancelled { background: #dc3545; color: #fff; }

        .order-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .order-link:hover {
            text-decoration: underline;
        }

        /* Order Detail Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal-content {
            background: var(--surface);
            margin: 5% auto;
            padding: 2rem;
            border-radius: 20px;
            width: 90%;
            max-width: 800px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .modal-header h2 {
            font-weight: 300;
            letter-spacing: 3px;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .order-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .detail-section h3 {
            color: var(--accent);
            margin-bottom: 1rem;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .detail-item {
            margin-bottom: 0.5rem;
        }

        .detail-label {
            color: var(--text-dim);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-select {
            padding: 8px;
            background: #111;
            border: 1px solid #222;
            color: var(--text);
            border-radius: 5px;
            font-family: inherit;
        }

        .items-list {
            margin-top: 1rem;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        /* Loading and Error States */
        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-dim);
        }

        .error {
            background: #ff4444;
            color: white;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
        }

        .success {
            background: var(--accent);
            color: var(--dark-bg);
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .container { padding: 1rem 3%; }

            .dashboard-header {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }

            .filters {
                flex-direction: column;
            }

            .orders-table {
                font-size: 0.8rem;
            }

            .orders-table th,
            .orders-table td {
                padding: 8px;
            }

            .order-details {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <!-- Login Page -->
    <div id="login-page" class="login-container">
        <div class="login-form">
            <h1>NORTHERN STINGERS</h1>
            <p style="color: var(--text-dim); margin-bottom: 2rem;">Admin Access</p>

            <form id="login-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>

                <button type="submit" class="btn-login">LOGIN</button>
            </form>

            <div id="login-error" class="error-message hidden"></div>
        </div>
    </div>

    <!-- Dashboard Page -->
    <div id="dashboard-page" class="container hidden">
        <div class="dashboard-header">
            <h1>Order Management</h1>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <div class="filters">
            <input type="text" class="search-input" placeholder="Search by customer name..." id="search-input">
            <input type="date" class="date-filter" id="date-filter">
        </div>

        <div id="message-container"></div>

        <div id="loading" class="loading">Loading orders...</div>

        <table class="orders-table" id="orders-table">
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Customer</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="orders-body">
                <!-- Orders will be populated here -->
            </tbody>
        </table>
    </div>

    <!-- Order Detail Modal -->
    <div id="order-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Order Details</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>

            <div id="order-details-content">
                <!-- Order details will be populated here -->
            </div>
        </div>
    </div>

    <script>
        // Supabase configuration
        const _supabaseUrl = 'https://oqhkidahpkhrhayxgeum.supabase.co';
        const _supabaseAnonKey = 'sb_publishable_X99T3SQDpC5WT3Df8K8V_Q_2zDICoRx';
        const supabase_client = supabase.createClient(_supabaseUrl, _supabaseAnonKey);

        // Simple authentication (hardcoded for now)
        const ADMIN_USERNAME = 'admin';
        const ADMIN_PASSWORD = 'password123';

        // Check if user is logged in on page load
        window.onload = function() {
            if (localStorage.getItem('admin_logged_in') === 'true') {
                showDashboard();
            } else {
                showLogin();
            }
        };

        // Login form handler
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('login-error');

            if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
                localStorage.setItem('admin_logged_in', 'true');
                showDashboard();
            } else {
                errorDiv.textContent = 'Invalid credentials';
                errorDiv.classList.remove('hidden');
            }
        });

        function showLogin() {
            document.getElementById('login-page').classList.remove('hidden');
            document.getElementById('dashboard-page').classList.add('hidden');
        }

        function showDashboard() {
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('dashboard-page').classList.remove('hidden');
            loadOrders();
        }

        function logout() {
            localStorage.removeItem('admin_logged_in');
            showLogin();
        }

        // Load orders from Supabase
        async function loadOrders() {
            const loadingDiv = document.getElementById('loading');
            const ordersTable = document.getElementById('orders-table');
            const ordersBody = document.getElementById('orders-body');

            loadingDiv.classList.remove('hidden');
            ordersTable.classList.add('hidden');

            try {
                const { data: orders, error } = await supabase
                    .from('orders')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                loadingDiv.classList.add('hidden');
                ordersTable.classList.remove('hidden');

                displayOrders(orders);
            } catch (error) {
                console.error('Error loading orders:', error);
                loadingDiv.innerHTML = '<div class="error">Failed to load orders. Please try again.</div>';
            }
        }

        // Display orders in table
        function displayOrders(orders) {
            const ordersBody = document.getElementById('orders-body');
            ordersBody.innerHTML = '';

            orders.forEach(order => {
                const row = document.createElement('tr');

                const statusClass = `status-${order.order_status.toLowerCase()}`;

                row.innerHTML = `
                    <td><a href="#" class="order-link" onclick="showOrderDetails('${order.order_id}')">${order.order_id}</a></td>
                    <td>${order.customer_name}</td>
                    <td>${order.total_price} kr</td>
                    <td><span class="status-badge ${statusClass}">${order.order_status}</span></td>
                    <td>${new Date(order.created_at).toLocaleDateString()}</td>
                    <td><button onclick="showOrderDetails('${order.order_id}')" style="background: var(--accent); color: var(--dark-bg); border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer;">View</button></td>
                `;

                ordersBody.appendChild(row);
            });
        }

        // Show order details in modal
        async function showOrderDetails(orderId) {
            document.getElementById('order-modal').style.display = 'block';
            document.getElementById('modal-title').textContent = `Order ${orderId}`;
            document.getElementById('order-details-content').innerHTML = '<div class="loading">Loading order details...</div>';

            try {
                const { data: order, error } = await supabase
                    .from('orders')
                    .select('*')
                    .eq('order_id', orderId)
                    .single();

                if (error) throw error;

                displayOrderDetails(order);
            } catch (error) {
                console.error('Error loading order details:', error);
                document.getElementById('order-details-content').innerHTML = '<div class="error">Failed to load order details.</div>';
            }
        }

        // Display full order details in modal
        function displayOrderDetails(order) {
            const statusOptions = ['Placed', 'Packaged', 'Shipped', 'Delivered', 'Cancelled'];
            const currentStatus = order.order_status;

            let itemsHtml = '';
            order.items.forEach(item => {
                itemsHtml += `
                    <div class="item-row">
                        <span>${item.quantity}x ${item.name} (${item.variant})</span>
                        <span>${item.subtotal} kr</span>
                    </div>
                `;
            });

            const detailsHtml = `
                <div class="order-details">
                    <div class="detail-section">
                        <h3>Customer Information</h3>
                        <div class="detail-item">
                            <span class="detail-label">Name:</span> ${order.customer_name}
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Email:</span> ${order.email}
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Phone:</span> ${order.phone}
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Address:</span> ${order.address}
                        </div>
                    </div>

                    <div class="detail-section">
                        <h3>Order Information</h3>
                        <div class="detail-item">
                            <span class="detail-label">Order ID:</span> ${order.order_id}
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Date:</span> ${new Date(order.created_at).toLocaleString()}
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Status:</span>
                            <select class="status-select" id="status-select" onchange="updateOrderStatus('${order.order_id}', this.value)">
                                ${statusOptions.map(status => 
                                    `<option value="${status}" ${status === currentStatus ? 'selected' : ''}>${status}</option>`
                                ).join('')}
                            </select>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Total:</span> ${order.total_price} kr
                        </div>
                    </div>
                </div>

                <div class="detail-section" style="grid-column: 1 / -1;">
                    <h3>Items</h3>
                    <div class="items-list">
                        ${itemsHtml}
                    </div>
                </div>
            `;

            document.getElementById('order-details-content').innerHTML = detailsHtml;
        }

        // Update order status
        async function updateOrderStatus(orderId, newStatus) {
            const messageContainer = document.getElementById('message-container');
            
            try {
                const { error } = await supabase
                    .from('orders')
                    .update({ order_status: newStatus })
                    .eq('order_id', orderId);

                if (error) throw error;

                // Show success message
                messageContainer.innerHTML = '<div class="success">Order status updated successfully!</div>';
                setTimeout(() => messageContainer.innerHTML = '', 3000);

                // Refresh the orders list
                loadOrders();
            } catch (error) {
                console.error('Error updating status:', error);
                messageContainer.innerHTML = '<div class="error">Failed to update order status.</div>';
                setTimeout(() => messageContainer.innerHTML = '', 5000);
            }
        }

        // Close modal
        function closeModal() {
            document.getElementById('order-modal').style.display = 'none';
        }

        // Search functionality (basic implementation)
        document.getElementById('search-input').addEventListener('input', function() {
            const searchTerm = this.value.toLowerCase();
            const rows = document.querySelectorAll('#orders-body tr');

            rows.forEach(row => {
                const customerName = row.cells[1].textContent.toLowerCase();
                if (customerName.includes(searchTerm)) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
        });

        // Date filter (basic implementation)
        document.getElementById('date-filter').addEventListener('change', function() {
            const selectedDate = this.value;
            const rows = document.querySelectorAll('#orders-body tr');

            if (!selectedDate) {
                rows.forEach(row => row.style.display = '');
                return;
            }

            rows.forEach(row => {
                const orderDate = row.cells[4].textContent;
                if (orderDate === new Date(selectedDate).toLocaleDateString()) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
